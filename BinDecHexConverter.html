<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binary / Decimal / Hex Converter</title>

  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%200%2064%2064%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2210%22 fill=%22black%22/%3E%3Cpath d=%22M24%2020%20L14%2032%20L24%2044%22 stroke=%22cyan%22 stroke-width=%226%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/%3E%3Cpath d=%22M40%2020%20L50%2032%20L40%2044%22 stroke=%22cyan%22 stroke-width=%226%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/%3E%3Cpath d=%22M30%2016%20L38%2024%22 stroke=%22cyan%22 stroke-width=%226%22 stroke-linecap=%22round%22/%3E%3Cpath d=%22M30%2040%20L38%2048%22 stroke=%22cyan%22 stroke-width=%226%22 stroke-linecap=%22round%22/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    :root {
      --primary: #00d4aa;
      --secondary: #0066ff;
      --bg: #0a0a0a;
      --card: rgba(26, 26, 26, 0.85);
      --card2: rgba(0, 0, 0, 0.22);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e6e6e6;
      --muted: #a0a0a0;
      --grad: linear-gradient(135deg, #00d4aa 0%, #0066ff 100%);
      --warn: #ff6b35;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
      --shadow2: 0 14px 40px rgba(0, 0, 0, 0.45);
      --r: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 800px at 20% 10%,
          rgba(0, 212, 170, 0.15),
          transparent 60%),
        radial-gradient(1100px 700px at 85% 15%,
          rgba(0, 102, 255, 0.12),
          transparent 55%),
        var(--bg);
      padding: 18px;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: var(--grad);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(0, 0, 0, 0.1);
    }

    .title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.35rem;
      font-weight: 900;
      margin: 0;
      letter-spacing: 0.2px;
    }

    .title i,
    .title span {
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hint {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.22);
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(420px, 1.05fr) minmax(360px, 0.95fr);
      gap: 14px;
      padding: 14px 18px 18px;
      align-items: stretch;
    }

    .panel {
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: var(--card2);
      box-shadow: var(--shadow2);
      overflow: hidden;
      height: min(78vh, 720px);
      display: flex;
      flex-direction: column;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(0, 0, 0, 0.16);
      flex: 0 0 auto;
    }

    .panel-head .h {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: 0.2px;
    }

    .panel-head .h i {
      color: var(--secondary);
    }

    .panel-head .sub {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .left-body {
      padding: 14px;
      overflow: auto;
      flex: 1 1 auto;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.22);
      cursor: pointer;
      user-select: none;
      font-weight: 700;
      color: var(--text);
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0;
    }

    .stat {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.2);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .stat .v {
      font-weight: 900;
      color: var(--primary);
      font-size: 1.05rem;
      line-height: 1.1;
    }

    .stat .l {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 4px;
    }

    .cards {
      display: grid;
      gap: 12px;
    }

    .card {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.26);
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 2px;
      background: var(--grad);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.22s ease;
      opacity: 0.9;
    }

    .card:hover::before {
      transform: scaleX(1);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 12px 10px;
    }

    .card-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      color: var(--primary);
    }

    .card-title i {
      color: var(--secondary);
    }

    .copy {
      border: 1px solid rgba(0, 212, 170, 0.55);
      background: rgba(0, 212, 170, 0.06);
      color: var(--primary);
      border-radius: 12px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.14s ease, background 0.14s ease;
      white-space: nowrap;
    }

    .copy:hover {
      transform: translateY(-1px);
      background: rgba(0, 212, 170, 0.12);
    }

    .copy.copied {
      background: rgba(0, 212, 170, 0.22);
    }

    .field {
      width: 100%;
      border: none;
      outline: none;
      padding: 12px 14px 14px;
      font-size: 1rem;
      color: var(--text);
      background: rgba(0, 0, 0, 0.32);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      border-left: 3px solid rgba(0, 212, 170, 0.55);
    }

    .error {
      display: none;
      padding: 10px 14px 12px;
      color: #ff8d8d;
      font-size: 0.92rem;
    }

    .actions {
      margin-top: 12px;
    }

    .btn {
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 900;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.24);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn.warn {
      border-color: rgba(255, 107, 53, 0.65);
      color: var(--warn);
    }

    .btn.warn:hover {
      background: rgba(255, 107, 53, 0.12);
      transform: translateY(-1px);
    }

    .right-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
      flex: 1 1 auto;
    }

    .ref-search {
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.26);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
      font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
      flex: 0 0 auto;
    }

    .ref-search:focus {
      border-color: rgba(0, 212, 170, 0.45);
      box-shadow: 0 0 18px rgba(0, 212, 170, 0.12);
    }

    .ref-wrap {
      flex: 1 1 auto;
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.18);
    }

    .ref-wrap::-webkit-scrollbar,
    .left-body::-webkit-scrollbar {
      width: 12px;
    }

    .ref-wrap::-webkit-scrollbar-track,
    .left-body::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.55);
      border-radius: 999px;
    }

    .ref-wrap::-webkit-scrollbar-thumb,
    .left-body::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      border: 3px solid rgba(0, 0, 0, 0.55);
    }

    .ref-wrap::-webkit-scrollbar-thumb:hover,
    .left-body::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 170, 0.35);
    }

    .ref-wrap,
    .left-body {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.16) rgba(0, 0, 0, 0.55);
    }

    table.ref-table {
      width: 100%;
      border-collapse: collapse;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 0.92rem;
    }

    .ref-table thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(8px);
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .ref-table tbody td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text);
      white-space: nowrap;
    }

    .ref-table tbody tr:hover td {
      background: rgba(0, 212, 170, 0.07);
    }

    .ref-table tbody tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.02);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .panel {
        height: min(78vh, 680px);
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <h1 class="title">
        <i class="fa-solid fa-code-compare"></i>
        <span>Binary / Decimal / Hex</span>
      </h1>
    </div>

    <div class="layout">
      <!-- LEFT -->
      <section class="panel">
        <div class="panel-head">
          <div class="h"><i class="fa-solid fa-sliders"></i> Converter</div>
          <div class="sub">Type in any box</div>
        </div>

        <div class="left-body">
          <label class="toggle">
            <input id="groupToggle" type="checkbox" checked />
            Group binary in nibbles
          </label>

          <div class="stats" aria-live="polite">
            <div class="stat">
              <div class="v" id="statBase">—</div>
              <div class="l">Detected Base</div>
            </div>
            <div class="stat">
              <div class="v" id="statBits">—</div>
              <div class="l">Bits</div>
            </div>
            <div class="stat">
              <div class="v" id="statBytes">—</div>
              <div class="l">Bytes (min)</div>
            </div>
          </div>

          <div class="cards" id="results">
            <div class="card">
              <div class="card-head">
                <div class="card-title">
                  <i class="fa-solid fa-hashtag"></i> Decimal
                </div>
                <button class="copy" data-type="dec">
                  <i class="fa-regular fa-copy"></i> Copy
                </button>
              </div>
              <input id="decInput" class="field" placeholder="e.g. 255" aria-label="Decimal input" />
              <div class="error" id="decError" role="alert"></div>
            </div>

            <div class="card">
              <div class="card-head">
                <div class="card-title">
                  <i class="fa-solid fa-binary"></i> Binary
                </div>
                <button class="copy" data-type="bin">
                  <i class="fa-regular fa-copy"></i> Copy
                </button>
              </div>
              <input id="binInput" class="field" placeholder="e.g. 0001 0011 or 0b00010011" aria-label="Binary input" />
              <div class="error" id="binError" role="alert"></div>
            </div>

            <div class="card">
              <div class="card-head">
                <div class="card-title">
                  <i class="fa-solid fa-hexagon-nodes"></i> Hex
                </div>
                <button class="copy" data-type="hex">
                  <i class="fa-regular fa-copy"></i> Copy
                </button>
              </div>
              <input id="hexInput" class="field" placeholder="e.g. FF or 0xFF" aria-label="Hex input" />
              <div class="error" id="hexError" role="alert"></div>
            </div>
          </div>

          <div class="actions">
            <button id="clearBtn" class="btn warn">
              <i class="fa-regular fa-trash-can"></i> Clear
            </button>
          </div>
        </div>
      </section>

      <!-- RIGHT -->
      <section class="panel">
        <div class="panel-head">
          <div class="h">
            <i class="fa-solid fa-table"></i> 0–255 Reference
          </div>
          <div class="sub">Search dec / hex / bin</div>
        </div>

        <div class="right-body">
          <input id="refSearch" class="ref-search" placeholder="Search… (e.g. 128, FF, 11110000)"
            aria-label="Search table" />

          <div class="ref-wrap" aria-label="Reference table scroll area">
            <table class="ref-table" aria-label="Decimal Binary Hex table">
              <thead>
                <tr>
                  <th style="width: 110px">Decimal</th>
                  <th>Binary (8-bit)</th>
                  <th style="width: 90px">Hex</th>
                </tr>
              </thead>
              <tbody id="refTbody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    // Elements
    const decInput = document.getElementById("decInput");
    const binInput = document.getElementById("binInput");
    const hexInput = document.getElementById("hexInput");

    const decError = document.getElementById("decError");
    const binError = document.getElementById("binError");
    const hexError = document.getElementById("hexError");

    const clearBtn = document.getElementById("clearBtn");
    const groupToggle = document.getElementById("groupToggle");

    const statBase = document.getElementById("statBase");
    const statBits = document.getElementById("statBits");
    const statBytes = document.getElementById("statBytes");

    // Reference table elements
    const refTbody = document.getElementById("refTbody");
    const refSearch = document.getElementById("refSearch");

    let lastParsed = null; // BigInt or null
    let updating = false;

    function showError(el, msg) {
      el.textContent = msg;
      el.style.display = "block";
    }
    function clearError(el) {
      el.textContent = "";
      el.style.display = "none";
    }

    function bitsNeeded(nBig) {
      if (nBig === 0n) return 1;
      let n = nBig < 0n ? -nBig : nBig;
      let bits = 0;
      while (n > 0n) {
        n >>= 1n;
        bits++;
      }
      return bits;
    }

    function padToMultiple(bitsStr, multiple) {
      let s = String(bitsStr);
      const rem = s.length % multiple;
      if (rem === 0) return s;
      return "0".repeat(multiple - rem) + s;
    }

    function formatBinaryGrouped(bitsStr, groupSize = 4) {
      const s = String(bitsStr);
      const out = [];
      for (let i = 0; i < s.length; i += groupSize)
        out.push(s.slice(i, i + groupSize));
      return out.join(" ");
    }

    function toBinaryString(absBigInt) {
      const raw = absBigInt.toString(2);
      return padToMultiple(raw || "0", 8); // always byte padded
    }

    function sanitizeForBase(raw, base) {
      let v = (raw || "").trim();
      v = v.replace(/^0x/i, "").replace(/^0b/i, "").replace(/[\s_]/g, "");
      if (v === "") return v;

      const sign = v[0] === "-" || v[0] === "+" ? v[0] : "";
      v = sign ? sign + v.slice(1) : v;

      if (base === 10)
        return sign + v.slice(sign ? 1 : 0).replace(/[^0-9]/g, "");
      if (base === 2)
        return sign + v.slice(sign ? 1 : 0).replace(/[^01]/g, "");
      return (
        sign + v.slice(sign ? 1 : 0).replace(/[^0-9a-fA-F]/g, "")
      ).toUpperCase();
    }

    function parseBigIntFrom(base, value) {
      if (!value || value === "+" || value === "-") return null;
      const sign = value[0] === "-" ? "-" : value[0] === "+" ? "+" : "";
      const core = value.slice(sign ? 1 : 0);
      try {
        if (base === 10) return BigInt(value);
        if (base === 2) return BigInt((sign || "") + "0b" + core);
        if (base === 16) return BigInt((sign || "") + "0x" + core);
      } catch {
        return null;
      }
      return null;
    }

    function updateStats(fromBase, n) {
      if (n === null) {
        statBase.textContent = "—";
        statBits.textContent = "—";
        statBytes.textContent = "—";
        return;
      }
      const abs = n < 0n ? -n : n;
      const bits = bitsNeeded(abs);
      const bytes = Math.ceil(bits / 8);

      statBase.textContent = fromBase;
      statBits.textContent = (n === 0n ? 1 : bits).toString();
      statBytes.textContent = bytes.toString();
    }

    function renderBinaryFieldFromBigInt(n) {
      const sign = n < 0n ? "-" : "";
      const abs = n < 0n ? -n : n;

      const bytePadded = toBinaryString(abs);
      binInput.value = groupToggle.checked
        ? (sign ? "-" : "") + formatBinaryGrouped(bytePadded, 4)
        : (sign ? "-" : "") + bytePadded;
    }

    function setAllFromBigInt(n, source) {
      updating = true;
      lastParsed = n;

      const sign = n < 0n ? "-" : "";
      const abs = n < 0n ? -n : n;

      const decStr = sign + abs.toString(10);
      const hexStr = sign + abs.toString(16).toUpperCase();

      if (source !== "dec") decInput.value = decStr;
      if (source !== "hex") hexInput.value = hexStr;
      if (source !== "bin") renderBinaryFieldFromBigInt(n);

      updating = false;
    }

    function convertFrom(which) {
      if (updating) return;

      clearError(decError);
      clearError(binError);
      clearError(hexError);

      let raw = "";
      let base = 10;

      if (which === "dec") {
        raw = sanitizeForBase(decInput.value, 10);
        decInput.value = raw;
        base = 10;
      } else if (which === "bin") {
        raw = sanitizeForBase(binInput.value, 2);
        base = 2;
      } else {
        raw = sanitizeForBase(hexInput.value, 16);
        hexInput.value = raw;
        base = 16;
      }

      if (!raw) {
        updating = true;
        if (which !== "dec") decInput.value = "";
        if (which !== "bin") binInput.value = "";
        if (which !== "hex") hexInput.value = "";
        updating = false;
        lastParsed = null;
        updateStats("—", null);
        return;
      }

      const n = parseBigIntFrom(base, raw);
      if (n === null) {
        const el =
          which === "dec" ? decError : which === "bin" ? binError : hexError;
        showError(el, "Invalid number for this base.");
        updateStats("—", null);
        return;
      }

      setAllFromBigInt(n, which);
      updateStats(
        which === "dec" ? "Decimal" : which === "bin" ? "Binary" : "Hex",
        n
      );
      if (which === "bin") renderBinaryFieldFromBigInt(n);
    }

    decInput.addEventListener("input", () => convertFrom("dec"));
    binInput.addEventListener("input", () => convertFrom("bin"));
    hexInput.addEventListener("input", () => convertFrom("hex"));

    groupToggle.addEventListener("change", () => {
      if (lastParsed !== null) {
        renderBinaryFieldFromBigInt(lastParsed);
      } else if (binInput.value) {
        const sanitized = sanitizeForBase(binInput.value, 2);
        const sign =
          sanitized[0] === "-" ? "-" : sanitized[0] === "+" ? "+" : "";
        const core = sanitized.slice(sign ? 1 : 0);
        const bytePadded = padToMultiple(core || "0", 8);

        binInput.value = groupToggle.checked
          ? (sign ? "-" : "") + formatBinaryGrouped(bytePadded, 4)
          : (sign ? "-" : "") + bytePadded;
      }
    });

    document.querySelectorAll(".copy").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const type = btn.getAttribute("data-type");
        let toCopy = "";

        if (type === "dec") toCopy = decInput.value || "";
        else if (type === "hex") toCopy = hexInput.value || "";
        else {
          if (lastParsed === null) {
            const s = sanitizeForBase(binInput.value, 2);
            const sign = s[0] === "-" ? "-" : s[0] === "+" ? "+" : "";
            const core = s.slice(sign ? 1 : 0);
            toCopy = (sign ? "-" : "") + padToMultiple(core || "0", 8);
          } else {
            const sign = lastParsed < 0n ? "-" : "";
            const abs = lastParsed < 0n ? -lastParsed : lastParsed;
            toCopy = (sign ? "-" : "") + toBinaryString(abs);
          }
        }

        try {
          await navigator.clipboard.writeText(toCopy);
          btn.classList.add("copied");
          btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
          setTimeout(() => {
            btn.classList.remove("copied");
            btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
          }, 1000);
        } catch {
          alert("Copy failed. Your browser may block clipboard access.");
        }
      });
    });

    clearBtn.addEventListener("click", () => {
      updating = true;
      decInput.value = "";
      binInput.value = "";
      hexInput.value = "";
      updating = false;
      clearError(decError);
      clearError(binError);
      clearError(hexError);
      lastParsed = null;
      updateStats("—", null);
      decInput.focus();
    });

    updateStats("—", null);

    // ===== Reference table =====
    let refRows = [];

    function padLeft(s, len, ch) {
      s = String(s);
      while (s.length < len) s = ch + s;
      return s;
    }

    function makeRow(dec) {
      const rawBin = padLeft(dec.toString(2), 8, "0");
      const bin = formatBinaryGrouped(rawBin, 4);
      const hex = padLeft(dec.toString(16).toUpperCase(), 2, "0");
      return { dec: String(dec), bin, hex, binRaw: rawBin };
    }

    function renderRefRows(rows) {
      refTbody.innerHTML = rows
        .map(
          (r) => `
        <tr>
          <td>${r.dec}</td>
          <td>${r.bin}</td>
          <td>${r.hex}</td>
        </tr>
      `
        )
        .join("");
    }

    function buildRefTable() {
      refRows = [];
      for (let i = 0; i <= 255; i++) refRows.push(makeRow(i));
      renderRefRows(refRows);
    }

    buildRefTable();

    /* ============================
       FIXED SEARCH (THIS IS THE FIX)
       - Only treat as binary search if the query is actually binary
       - So searching "251" will NOT become onlyBits="1"
       ============================ */
    refSearch.addEventListener("input", () => {
      const qRaw = (refSearch.value || "").trim();
      if (!qRaw) {
        renderRefRows(refRows);
        return;
      }

      // Normalize for hex/bin matching
      const qCompact = qRaw.replace(/[\s_]/g, "");
      const qUpper = qCompact.toUpperCase();

      // Only run binary matching if the user typed ONLY 0/1 (optionally with spaces/underscores),
      // or they started with 0b / 0B.
      const isBinaryQuery =
        /^0b/i.test(qRaw) || /^[01]+$/.test(qCompact);

      const bitsQuery = isBinaryQuery
        ? qCompact.replace(/^0b/i, "")
        : "";

      const filtered = refRows.filter((r) => {
        // Decimal: match by substring like before
        if (r.dec.includes(qRaw)) return true;

        // Hex: allow searching "FF" or "0xFF"
        const hexQuery = qUpper.replace(/^0X/, "");
        if (r.hex.includes(hexQuery)) return true;

        // Binary: only if it's truly a binary query
        if (bitsQuery && r.binRaw.includes(bitsQuery)) return true;

        return false;
      });

      renderRefRows(filtered);
    });
  </script>
</body>
